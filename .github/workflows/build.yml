name: 打包 Windows .exe

# 触发条件：每次推送代码到 main 分支时自动运行
# 也可以在 GitHub 网页上手动触发（workflow_dispatch）
on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 允许在 GitHub 网页上手动点击运行

jobs:
  build-windows:
    # 使用微软提供的 Windows Server 2019 云服务器（免费）
    runs-on: windows-latest

    steps:
      # 第一步：拉取代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 第二步：安装 Python 3.10
      - name: 安装 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 第三步：安装依赖（含 PyInstaller）
      - name: 安装依赖
        run: pip install -r requirements.txt

      # 第四步：执行打包
      - name: 打包为 .exe
        run: pyinstaller build.spec --noconfirm

      # 第五步：将 .exe 作为 Artifact 上传，供下载
      - name: 上传打包结果
        uses: actions/upload-artifact@v4
        with:
          name: ExamClient-Windows
          path: dist/ExamClient.exe
          # Artifact 保留 90 天，之后自动删除
          retention-days: 90
